<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 220">

<defs>

<linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">

<stop offset="0%" stop-color="#00D4FF"></stop>

<stop offset="100%" stop-color="#FF2D95"></stop>

</linearGradient>

<filter id="glow">

<feGaussianBlur stdDeviation="4" result="coloredBlur"></feGaussianBlur>

<feMerge>
<feMergeNode in="coloredBlur"></feMergeNode>
<feMergeNode in="SourceGraphic"></feMergeNode>
</feMerge>

</filter>

</defs>

<!-- NODOS -->

<circle cx="150" cy="60" r="12" fill="url(#grad1)" filter="url(#glow)"></circle>

<circle cx="100" cy="120" r="12" fill="url(#grad1)" filter="url(#glow)"></circle>

<circle cx="150" cy="180" r="12" fill="url(#grad1)" filter="url(#glow)"></circle>

<circle cx="250" cy="60" r="12" fill="url(#grad1)" filter="url(#glow)"></circle>

<circle cx="300" cy="120" r="12" fill="url(#grad1)" filter="url(#glow)"></circle>

<circle cx="250" cy="180" r="12" fill="url(#grad1)" filter="url(#glow)"></circle>

<!-- CONEXIONES -->

<line x1="150" y1="60" x2="200" y2="120" stroke="url(#grad1)" stroke-width="3"></line>

<line x1="100" y1="120" x2="200" y2="120" stroke="url(#grad1)" stroke-width="3"></line>

<line x1="150" y1="180" x2="200" y2="120" stroke="url(#grad1)" stroke-width="3"></line>

<line x1="250" y1="60" x2="200" y2="120" stroke="url(#grad1)" stroke-width="3"></line>

<line x1="300" y1="120" x2="200" y2="120" stroke="url(#grad1)" stroke-width="3"></line>

<line x1="250" y1="180" x2="200" y2="120" stroke="url(#grad1)" stroke-width="3"></line>

<!-- JFV -->

<text x="200" y="135" text-anchor="middle" font-family="Poppins, Arial" font-size="56" font-weight="800" fill="url(#grad1)" filter="url(#glow)">

JFV

</text>

<!-- NOMBRE -->

<text x="400" y="95" font-family="Poppins, Arial" font-size="34" font-weight="700" fill="#FFFFFF">

Juliana Franco Villegas

</text>

<text x="400" y="140" font-family="Poppins, Arial" font-size="18" fill="#BFC7D5">

AI • Education • Innovation • Technology

</text>

</svg>